{% extends "base/layout.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:700px;">

    <div class="card bg-dark text-white shadow">

        <div class="card-header">
            <h3>Edit Profile</h3>
        </div>

        <div class="card-body">

            <form
                method="post"
                enctype="multipart/form-data"
            >

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    class="btn btn-primary"
                    type="submit"
                >
                    Save Changes
                </button>

               <a href="{% url 'profile' request.user.username %}" class="btn btn-secondary">
                  Cancel
                </a>
            </form>

        </div>

    </div>

</div>

{% endblock %}
