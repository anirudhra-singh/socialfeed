{% load static %}

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>
           {% block title %}
             SocialFeed
           {% endblock  %} 
    </title>

</head>
<body style="background-color:#121212;">
   <nav class="navbar navbar-dark bg-dark px-4">
  <div class="container-fluid">
    <!-- left side navbar -->
    <a class="navbar-brand fw-bold" href="{% url 'tweet_list' %}">
      Socialfeed
    </a>

     <!-- Right side -->
  <div class="d-flex align-items-center">
     {% if user.is_authenticated %}
     <a href="{% url 'tweet_list' %}" class="btn btn-primary btn-sm me-2">
        Home </a>
        <a href="{% url 'tweet_create' %}" class="btn btn-success btn-sm me-2">
        Create
      </a>

      <form method = "post" action="{% url 'logout'%}" style="display:inline;">
        {%csrf_token%}
        <button class ="btn btn-danger btn-sm"
        type ="submit" > Logout </button>
      
      </form>
    
     {% else %}

      <a href="{% url 'register'%}" class=" btn btn-info btn-sm me-2 " > 
        Register
      </a>

      <a href="{% url 'login'%}" class=" btn btn-warning btn-sm me-2 " >
        Login</a>

      {% endif %}
    
  </div>
</nav>
   <div class="container">
    {% block content %}
      
    {% endblock %}

    
</body>
</html>
